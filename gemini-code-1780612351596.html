<script>
// --- Theme Toggle Logic ---
const htmlClassList = document.documentElement.classList;

function updateThemeIcons() {
    const isDark = htmlClassList.contains('dark');
    document.querySelectorAll('.theme-icon').forEach(icon => {
        icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
    });
    // Re-render icons after changing data attribute
    lucide.createIcons();
}

function toggleTheme() {
    htmlClassList.toggle('dark');
    const isDark = htmlClassList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    updateThemeIcons();
}

// Initialize theme on load
if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    htmlClassList.add('dark');
} else if (localStorage.theme === 'light') {
    htmlClassList.remove('dark');
}
// --------------------------

const WHATSAPP_NUM = "256709207543";

const SERVICES = [
{ id: 1, name: 'Gelato OG', category: 'Big Buds-New Arrivals', image: 'IMG-20260604-WA0002.jpg', price: '25k', desc: 'Premium selection of meticulously cured and hand-trimmed herbal buds.' },
{ id: 2, name: 'Tangerine Sorbet', category: 'Big Buds-New Arrivals', image: 'IMG-20260604-WA0003.jpg', price: '25k', desc: 'Slow-burning pre-rolled & packed evenly with choice-grade flowers.' },
{ id: 3, name: 'Kosher Haze', category: 'Big Buds-New Arrivals', image: 'IMG-20260604-WA0004.jpg', price: '25k', desc: 'Stay-freshly baked with premium botanical infusions.' },
{ id: 4, name: 'Wedding Cake', category: 'Big Buds-New Arrivals', image: 'IMG-20260604-WA0005.jpg', price: '25k', desc: 'Award Winning Strain (Newly Arrived).' },
{ id: 5, name: 'Mimosa', category: 'Big Buds-New Arrivals', image: 'IMG-20260604-WA0006.jpg', price: '25K', desc: 'Best of Both Worlds (Newly Stashed).' },

{ id: 7, name: 'Gorilla Breaths', category: 'Small Buds-Fresh mix', image: 'IMG-20260604-WA0008.jpg', price: '25k', desc: 'Fresh Mix All day.' },
{ id: 8, name: 'Wedding cake mix', category: 'Small Buds-Fresh mix', image: 'IMG-20260604-WA0009.jpg', price: '25k', desc: 'Fresh Mix All day.' },
{ id: 9, name: 'Girl scout cookies', category: 'Small Buds-Fresh mix', image: 'IMG-20260604-WA0010.jpg', price: '20k', desc: 'Perfect mellow height.' },
{ id: 10, name: 'Ice Gushers', category: 'Small Buds-Fresh mix', image: 'IMG-20260604-WA0011.jpg', price: '20k', desc: 'Super Stoner.' },
{ id: 11, name: 'Hard-core OG', category: 'Small Buds-Fresh mix', image: 'IMG-20260604-WA0012.jpg', price: '25k', desc: 'G.O.A.T' },
{ id: 12, name: 'Gummies', category: 'Edibles', image: 'IMG-20260604-WA0015 (1).jpg', price: '10k', desc: 'Delectable, sweet, and chewy fruit-flavored gummies infused with high-grade extracts.' },
{ id: 13, name: 'Weed Chocolate', category: 'Edibles', image: 'IMG-20260604-WA0016 (1).jpg', price: '10k', desc: 'Belgian weed chocolate cakes layered with rich cocoa and pure botanical infusions.' },
{ id: 14, name: 'Cookies', category: 'Edibles', image: 'IMG-20260604-WA0017 (1).jpg', price: '10k', desc: 'Stay Baked low-key with our premium weed cookies' }
];

function renderServices(items) {
const container = document.getElementById('service-feed');

if (items.length === 0) {
container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-500 dark:text-emerald-700">No items matching your search.</div>`;
return;
}
container.innerHTML = items.map(item => `
<div onclick="openModal(${item.id})" class="bg-white/70 dark:bg-[#061611]/70 backdrop-blur-md border border-slate-200 dark:border-emerald-500/10 p-3 rounded-2xl flex items-center gap-4 hover:bg-slate-50 dark:hover:bg-[#061e18] transition group fade-in cursor-pointer hover:border-emerald-500/30 shadow-sm dark:shadow-none">
<div class="w-24 h-24 rounded-xl overflow-hidden shrink-0 border border-slate-100 dark:border-emerald-950">
<img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
</div>

<div class="flex-1 min-w-0">
<span class="text-[9px] font-bold text-emerald-600 dark:text-emerald-400 tracking-wider uppercase mb-0.5 block">${item.category}</span>
<h3 class="font-bold text-slate-900 dark:text-white text-sm md:text-base mb-1 truncate">${item.name}</h3>
<p class="text-[10px] text-slate-500 dark:text-emerald-100/60 line-clamp-2 leading-tight mb-2">${item.desc}</p>
<div class="flex justify-between items-center">
<span class="text-xs font-black text-emerald-700 dark:text-emerald-300 bg-emerald-50 dark:bg-[#030d0a] px-2 py-0.5 rounded border border-emerald-200 dark:border-emerald-900/60">${item.price}</span>
<div class="bg-emerald-100 dark:bg-emerald-600/20 text-emerald-600 dark:text-emerald-400 p-1.5 rounded-lg group-hover:bg-emerald-600 group-hover:text-white transition duration-300">
<i data-lucide="arrow-right" class="w-4 h-4"></i>
</div>
</div>
</div>
</div>
`).join('');

lucide.createIcons();
}

function filterCategory(category) {
const pills = document.querySelectorAll('.cat-pill');
const navItems = document.querySelectorAll('.nav-item');

pills.forEach(pill => {
const isActive = pill.innerText.trim() === category || (category === 'all' && pill.innerText.trim() === 'All');
pill.className = isActive
? "cat-pill whitespace-nowrap px-4 py-2 rounded-full bg-emerald-600 text-white text-xs font-bold border border-emerald-500 shadow-lg shadow-emerald-950/40"
: "cat-pill whitespace-nowrap px-4 py-2 rounded-full bg-white dark:bg-[#0a2018] text-slate-600 dark:text-emerald-400 border border-slate-200 dark:border-emerald-900/60 text-xs font-semibold hover:bg-slate-100 dark:hover:bg-emerald-900 hover:text-slate-900 dark:hover:text-white transition";
});

navItems.forEach(item => {
const isMatch = item.getAttribute('onclick').includes(`'${category}'`);
if (isMatch) {
item.className = "nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-medium bg-emerald-600 text-white shadow-lg shadow-emerald-950/40";
} else {
item.className = "nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-medium text-slate-600 dark:text-emerald-400 hover:bg-slate-100 dark:hover:bg-emerald-900/50 hover:text-slate-900 dark:hover:text-white";
}
});

if (category === 'all') {
renderServices(SERVICES);
} else {
const filtered = SERVICES.filter(item => item.category === category);
renderServices(filtered);
}
}

document.getElementById('search-input').addEventListener('input', (e) => {
const term = e.target.value.toLowerCase();
const filtered = SERVICES.filter(item =>
item.name.toLowerCase().includes(term) ||
item.category.toLowerCase().includes(term) ||
item.desc.toLowerCase().includes(term)
);
renderServices(filtered);
});

function openModal(id) {
const item = SERVICES.find(i => i.id === id);
const modal = document.getElementById('item-modal');
const content = document.getElementById('modal-content');

const whatsappLink = `https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(`Hello FourZ Kampala, I would like to order: ${item.name} (${item.price})`)}`;
content.innerHTML = `
<div class="h-56 w-full relative">
<img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
<div class="absolute inset-0 bg-gradient-to-t from-white dark:from-[#061813] to-transparent"></div>
<div class="absolute bottom-4 left-6 flex gap-2">
<span class="px-2 py-1 bg-emerald-600 text-white text-[10px] font-bold rounded uppercase tracking-wider shadow-sm">${item.category}</span>
<span class="px-2 py-1 bg-white dark:bg-[#030d0a] text-emerald-700 dark:text-emerald-300 text-[10px] font-black rounded uppercase tracking-wider border border-slate-200 dark:border-emerald-900/60 shadow-sm">${item.price}</span>
</div>
</div>
<div class="p-6 text-center">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">${item.name}</h2>
<p class="text-slate-600 dark:text-emerald-100/70 text-sm mb-8 leading-relaxed">
${item.desc}
</p>

<div class="flex gap-3">
<button onclick="closeModal()" class="flex-1 py-3.5 rounded-xl border border-slate-300 dark:border-emerald-900 text-slate-600 dark:text-emerald-400 font-semibold hover:bg-slate-50 dark:hover:bg-emerald-950/40 transition">
Close
</button>
<a href="${whatsappLink}" target="_blank" class="flex-[2] py-3.5 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700 transition shadow-lg dark:shadow-emerald-950/45 flex items-center justify-center gap-2">
<i data-lucide="message-circle" class="w-5 h-5"></i> Order via WhatsApp
</a>
</div>
<p class="text-[10px] text-emerald-600 dark:text-emerald-600 mt-4">Fast-delivery operations active in the Kampala metropolitan area. Chat directly to coordinate drop-off points.</p>
</div>
`;

lucide.createIcons();
modal.classList.remove('hidden');
}

function closeModal() {
document.getElementById('item-modal').classList.add('hidden');
}

// Initial Render
renderServices(SERVICES);
updateThemeIcons(); // Set initial icons on load
</script>
